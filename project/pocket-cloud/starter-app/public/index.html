<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storefront · Pocket Cloud tenant</title>
<style>
:root{--brand:#0f8b8d}
*{box-sizing:border-box}
body{margin:0;font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f7f6f2;color:#22293a}
header{background:var(--brand);color:#fff;padding:34px 22px 26px;text-align:center}
header h1{margin:0;font-size:30px}
header p{margin:6px 0 0;opacity:.9}
main{max-width:860px;margin:0 auto;padding:22px 16px 70px}
.banner{display:none;background:#fdf1df;border:1.5px solid #e0a437;color:#7a5a12;border-radius:10px;padding:10px 14px;margin:14px 0;font-size:14.5px}
.banner.show{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:18px}
.card{background:#fff;border:1px solid #e5e1d8;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card h3{margin:0 0 4px;font-size:16px}
.price{font-weight:800;color:var(--brand);font-size:18px}
.stock{font-size:12.5px;color:#69708a}
button{margin-top:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 14px;font:inherit;font-weight:700;cursor:pointer}
button:disabled{opacity:.45;cursor:not-allowed}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#22293a;color:#fff;border-radius:10px;padding:10px 18px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
footer{text-align:center;font-size:12.5px;color:#8a90a5;padding:20px}
footer code{background:#ecebe4;border-radius:5px;padding:1px 7px}
</style>
</head>
<body>
<header id="hd">
  <h1 id="tname">Loading…</h1>
  <p id="ttag"></p>
</header>
<main>
  <div class="banner" id="degraded">
    ⚠️ <strong>Degraded mode.</strong> The product API is unreachable, so you're seeing a cached
    catalog and ordering is disabled. This is <em>graceful degradation</em> — the site bends, it doesn't break.
  </div>
  <div class="grid" id="grid"></div>
</main>
<footer>
  Hosted on <strong>Pocket Cloud</strong> · served by <code id="host">—</code> · refresh to see the load balancer pick a server
</footer>
<div class="toast" id="toast"></div>

<script>
// Cached fallback catalog: used only when the API is down (see the M4 kill-switch demo).
const FALLBACK = [
  { id: 0, name: "Cached item — API offline", price: 0, stock: 0 }
];

const $ = id => document.getElementById(id);
let apiUp = true;

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

function render(products){
  $('grid').innerHTML = products.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <div class="price">$${Number(p.price).toFixed(2)}</div>
      <div class="stock">${p.stock > 500 ? 'always available' : p.stock + ' in stock'}</div>
      <button ${apiUp ? '' : 'disabled'} onclick="order(${p.id}, this)">Order</button>
    </div>`).join('');
}

async function order(id, btn){
  btn.disabled = true;
  try{
    const r = await fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ productId:id, qty:1 }) });
    const o = await r.json();
    toast(r.ok ? `✓ Order #${o.orderId} placed` : `Error: ${o.error}`);
  }catch{ toast('API unreachable — order not placed'); }
  btn.disabled = false;
}

async function boot(){
  try{
    const cfg = await (await fetch('/api/config')).json();
    document.documentElement.style.setProperty('--brand', cfg.color);
    $('tname').textContent = cfg.tenant;
    $('ttag').textContent = cfg.tagline;
    $('host').textContent = cfg.served_by;
    document.title = cfg.tenant + ' · Pocket Cloud tenant';
  }catch{ $('tname').textContent = 'Storefront'; }

  try{
    const products = await (await fetch('/api/products')).json();
    apiUp = true;
    render(products);
  }catch{
    apiUp = false;
    $('degraded').classList.add('show');
    render(FALLBACK);
  }
}
boot();
</script>
</body>
</html>
